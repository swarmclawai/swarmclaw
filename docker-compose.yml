services:
  swarmclaw:
    image: ghcr.io/swarmclawai/swarmclaw:latest
    build: .
    ports:
      - "3456:3456"
      - "3457:3457"
    volumes:
      - ./data:/app/data
    env_file:
      - path: ./.env.local
        required: false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3456/api/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
