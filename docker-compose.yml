services:
  swarmclaw:
    image: ghcr.io/swarmclawai/swarmclaw:latest
    build: .
    ports:
      - "127.0.0.1:3456:3456"
      - "127.0.0.1:3457:3457"
    environment:
      DATA_DIR: /app/data
      WORKSPACE_DIR: /app/data/workspace
      BROWSER_PROFILES_DIR: /app/data/browser-profiles
    volumes:
      - ./data:/app/data
    env_file:
      - path: ./.env.local
        required: false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3456/api/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
