name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint baseline (no net-new lint issues)
        id: lint_baseline
        continue-on-error: true
        run: npm run lint:baseline -- --report-json artifacts/lint-regressions.json --report-md artifacts/lint-regressions.md

      - name: Test
        run: npm test

      - name: Type-check
        run: npm run type-check

      - name: MCP Conformance
        run: npm run test:mcp:conformance
        env:
          SWARMCLAW_MCP_CONFORMANCE_REQUIRED: "0"

      - name: Build
        run: npm run build:ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Start built app for smoke test
        run: |
          mkdir -p artifacts
          ACCESS_KEY=ci-smoke PORT=3456 HOSTNAME=127.0.0.1 npm start > artifacts/smoke-server.log 2>&1 &
          echo $! > /tmp/swarmclaw-ci.pid
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:3456/login >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat artifacts/smoke-server.log
          exit 1

      - name: Browser route smoke
        env:
          SWARMCLAW_ACCESS_KEY: ci-smoke
          SWARMCLAW_URL: http://127.0.0.1:3456
        run: npm run smoke:browser

      - name: Publish lint baseline report
        if: always()
        run: |
          if [ -f artifacts/lint-regressions.md ]; then
            cat artifacts/lint-regressions.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload lint baseline artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-baseline-report
          path: artifacts/lint-regressions.*
          if-no-files-found: ignore

      - name: Upload smoke artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-artifacts
          path: |
            artifacts/smoke-server.log
            .tmp-smoke-artifacts/**
          if-no-files-found: ignore

      - name: Stop built app
        if: always()
        run: |
          if [ -f /tmp/swarmclaw-ci.pid ]; then
            kill "$(cat /tmp/swarmclaw-ci.pid)" || true
          fi

      - name: Enforce lint baseline gate
        if: steps.lint_baseline.outcome == 'failure'
        run: |
          echo "Lint baseline failed. See lint-baseline-report artifact and workflow summary for details."
          exit 1
